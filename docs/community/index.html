<!DOCTYPE html>
<head>
    <title>UDMI Community Test Results</title>
</head>
<body>
    <h1>UDMI Community Test Results</h1>
    <div id="device-table"></div>
    <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
    <script>


      var tabledata = [
        { make: "ACME", model: "ACE-1", datasheet: "make/ACME/ACE-1.html", udmi_score: 281, udmi_report: "make/ACME/ACE-1_sequencer.pdf" },
        { make: "ACME", model: "AM-23", datasheet: "make/ACME/ACE-1.html" },
        { make: "Bert", model: "BRT-1", datasheet: "make/BERT/BRT-1.html", udmi_score: 279, udmi_report: "make/BERT/BRT-1_sequencer.pdf", testrun_result: "pass", testrun_report: "make/BERT/BRT-1_testrun.pdf" },
        { make: "Ajax", model: "AJX-1", datasheet: "make/AJAX/AJX-1.html", testrun_result: "fail", testrun_report: "make/AJAX/AJX-1_testrun.pdf" }
      ];


      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function shortenPath(path) {
        return path.substring(path.lastIndexOf('/') + 1);
      }

      function checkForNa(cell) {
        let value = cell.getValue();
        return !value ? "n/a" : "<b>" + value + "</b>";
      }

      function formattedLink(cell, options) {
        let value = cell.getValue();
        return !value ? "n/a" : "<a href='" + value + "'>" + shortenPath(value) + "</a>";
      }


      var table = new Tabulator("#device-table", {
        columns: [
          { title: "Make", field: "make" },
          { title: "Model", field: "model" },
          { title: "Datasheet", field: "datasheet", formatter: formattedLink },
          { title: "UDMI Score", field: "udmi_score", formatter: checkForNa },
          { title: "UDMI Report", field: "udmi_report", formatter: formattedLink },
          { title: "TestRun Result", field: "testrun_result", formatter: checkForNa },
          { title: "TestRun Report", field: "testrun_report", formatter: formattedLink }
        ],
        data: shuffle(tabledata)
      });

    </script>
</body>
