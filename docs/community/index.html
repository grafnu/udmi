<!DOCTYPE html>
<head>
    <title>UDMI Community Test Results</title>
</head>
<body>
    <h1>UDMI Community Test Results</h1>
    <div id="device-table"></div>
    <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
    <script>



      var tabledata = [
        {make: "ACME", model: "ACE-1", datasheet: "make/ACME/ACE-1.html", udmi_score: 281, udmi_report: "make/ACME/ACE-1_sequencer.pdf"},
        {make: "ACME", model: "AM-23", datasheet: "make/ACME/ACE-1.html", udmi_score: 281, udmi_report: "make/ACME/ACE-1_sequencer.pdf"},
        {make: "BERT", model: "BRT-1", datasheet: "make/BERT/ACE-1.html", udmi_score: 281, udmi_report: "make/BERT/ACE-1_sequencer.pdf"},
        {make: "AJAX", model: "AJX-1", datasheet: "make/AJAX/AJX-1.html", udmi_score: 231, udmi_report: "make/AJAX/AJX-1_sequencer.pdf"}
      ];



      var table = new Tabulator("#device-table", {
        columns: [
          { title: "Make", field: "make" },
          { title: "Model", field: "model" },
          {
            title: "Datasheet",
            field: "datasheet",
            formatter: function(cell, formatterParams) {
              return "<a href='" + cell.getValue() + "'>" + cell.getValue() + "</a>";
            }
          },
          { title: "UDMI Score", field: "udmi_score" },
          {
            title: "UDMI Report",
            field: "udmi_report",
            formatter: function(cell, formatterParams) {
              return "<a href='" + cell.getValue() + "'>" + cell.getValue() + "</a>";
            }
          }
        ]
        data: tabledata,
      });
    </script>
</body>
